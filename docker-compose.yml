services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "7070:7070"
    environment:
      - DB_PASS=${DB_PASS}
      - API_KEY=${API_KEY}
    volumes:
      #Подменяем запечённый в образ config.yml на докер-версию,
      #где хосты postgres/redis, а не localhost
      - ./config/config.docker.yml:/app/config/config.yml:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gateway
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: